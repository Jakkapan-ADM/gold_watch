<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gold Watch · 07:00 / 20:00</title>
<meta name="description" content="บันทึกราคาทองอัตโนมัติที่ 7:00 และ 20:00 น. ไทย ผ่าน Google Sheets แล้วเช็คผลหลัง 1 ชั่วโมงให้เอง">

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="shortcut icon" href="icons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">

<meta name="theme-color" content="#14171F" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F7F4EC" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gold Watch">
<meta name="mobile-web-app-capable" content="yes">

<style>
@import url('https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

.gw-root {
  --bg: #14171F;
  --panel: #1B2030;
  --panel-2: #212739;
  --line: #2E3550;
  --gold: #D9B65C;
  --gold-bright: #F0D385;
  --up: #45B98C;
  --down: #E0605A;
  --text: #EAEAF2;
  --text-dim: #8D93AC;
  --text-faint: #5C6285;

  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  border-radius: 14px;
  padding: 28px;
  max-width: 780px;
  margin: 0 auto;
  box-sizing: border-box;
  transition: background 0.2s ease, color 0.2s ease;
}
.gw-root * { box-sizing: border-box; }

.gw-root.gw-light {
  --bg: #F7F4EC;
  --panel: #FFFFFF;
  --panel-2: #F1EDE1;
  --line: #DEDACB;
  --gold: #9C7415;
  --gold-bright: #7A5A0E;
  --up: #1F8F6B;
  --down: #C23B35;
  --text: #201C12;
  --text-dim: #6B6656;
  --text-faint: #9B9682;
}
.gw-root.gw-light .gw-slot-flag { background: rgba(156, 116, 21, 0.12); }
.gw-root.gw-light .gw-btn { color: #FFFDF7; }

.gw-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 1px solid var(--line);
  padding-bottom: 18px;
  margin-bottom: 20px;
}
.gw-brand { display: flex; align-items: center; gap: 12px; }
.gw-logo { width: 40px; height: 40px; flex-shrink: 0; }
.gw-title { font-family: 'Spectral', serif; font-weight: 700; font-size: 26px; color: var(--gold-bright); letter-spacing: 0.3px; }
.gw-sub { font-size: 12.5px; color: var(--text-dim); margin-top: 4px; }
.gw-header-right { display: flex; align-items: flex-end; gap: 14px; }
.gw-theme-toggle {
  width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--line);
  background: var(--panel); color: var(--text-dim); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, color 0.15s;
}
.gw-theme-toggle:hover { border-color: var(--gold); color: var(--gold-bright); }
.gw-theme-toggle svg { width: 17px; height: 17px; }
.gw-clock { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600; color: var(--text); text-align: right; }
.gw-clock-label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1.5px; text-align: right; }

.gw-slots { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
.gw-slot-card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; position: relative; overflow: hidden; }
.gw-slot-card.active { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
.gw-slot-time { font-family: 'JetBrains Mono', monospace; font-size: 19px; font-weight: 600; color: var(--gold-bright); }
.gw-slot-status { font-size: 12px; color: var(--text-dim); margin-top: 5px; }
.gw-slot-price { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--text); margin-top: 2px; }
.gw-slot-flag { position: absolute; top: 10px; right: 12px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); background: rgba(217,182,92,0.12); padding: 3px 7px; border-radius: 5px; }

.gw-card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 18px; margin-bottom: 18px; }
.gw-card-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.gw-card-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; }
.gw-updated { font-size: 11px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }

.gw-status-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.gw-status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--up); flex-shrink: 0; }
.gw-status-dot.off { background: var(--down); }
.gw-status-text { font-size: 13px; color: var(--text-dim); flex: 1; min-width: 180px; }
.gw-btn {
  background: var(--gold); color: #201804; border: none; border-radius: 7px; padding: 9px 16px;
  font-weight: 600; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s;
}
.gw-btn:hover { background: var(--gold-bright); }
.gw-btn:disabled { background: var(--text-faint); cursor: not-allowed; }
.gw-btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--text-dim); }
.gw-btn-ghost:hover { border-color: var(--gold); color: var(--gold-bright); background: transparent; }

.gw-pending-item {
  display: flex; justify-content: space-between; align-items: center; background: var(--panel-2);
  border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; gap: 10px; flex-wrap: wrap;
}
.gw-pending-info { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--text); }
.gw-pending-info span { color: var(--text-dim); }

.gw-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.gw-stat-box { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 12px; text-align: center; }
.gw-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--gold-bright); }
.gw-stat-val.up { color: var(--up); }
.gw-stat-val.down { color: var(--down); }
.gw-stat-lbl { font-size: 10.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 4px; }

.gw-table-wrap { overflow-x: auto; }
table.gw-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
table.gw-table th { text-align: left; color: var(--text-faint); font-weight: 500; text-transform: uppercase; font-size: 10.5px; letter-spacing: 0.6px; padding: 6px 10px; border-bottom: 1px solid var(--line); }
table.gw-table td { padding: 8px 10px; border-bottom: 1px solid var(--line); color: var(--text); }
.gw-dir-up { color: var(--up); font-weight: 600; }
.gw-dir-down { color: var(--down); font-weight: 600; }
.gw-dir-flat { color: var(--text-dim); }
.gw-empty { text-align: center; color: var(--text-faint); padding: 24px 0; font-size: 13px; }
.gw-error { color: var(--down); font-size: 12.5px; margin-top: 8px; }
</style>
<style>
  html, body { margin: 0; padding: 0; background: #14171F; min-height: 100vh; }
  body { padding: 20px 14px 40px; }
  @media (min-width: 600px) { body { padding: 40px 20px; } }
</style>
</head>
<body>
<div class="gw-root" id="gwRoot">
  <div class="gw-header">
    <div class="gw-brand">
      <svg class="gw-logo" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" id="gwLogoSvg">
        <rect x="3" y="3" width="34" height="34" rx="9" fill="#1B2030" id="gwLogoBg"/>
        <rect x="3" y="3" width="34" height="34" rx="9" fill="none" stroke="#D9B65C" stroke-width="1.4" id="gwLogoRing"/>
        <path d="M11 25.5 L14.5 14.5 H20 C22.5 14.5 24 16 24 18 C24 20.3 22.2 21.8 19.8 21.8 H15.6" stroke="#D9B65C" stroke-width="2.1" fill="none" stroke-linecap="round" stroke-linejoin="round" id="gwLogoG1"/>
        <path d="M25.5 14.5 L22.5 25.5" stroke="#D9B65C" stroke-width="2.1" fill="none" stroke-linecap="round" id="gwLogoG2"/>
        <path d="M27.5 25.5 L29 20" stroke="#D9B65C" stroke-width="2.1" fill="none" stroke-linecap="round" id="gwLogoG3"/>
        <circle cx="29.3" cy="16.3" r="1.6" fill="#D9B65C" id="gwLogoDot"/>
      </svg>
      <div>
        <div class="gw-title">Gold Watch · 07:00 / 20:00</div>
        <div class="gw-sub">ระบบบันทึกอัตโนมัติผ่าน Google Sheets — เช็คผลหลัง 1 ชั่วโมงให้เอง</div>
      </div>
    </div>
    <div class="gw-header-right">
      <button class="gw-theme-toggle" id="gwThemeToggle" title="สลับธีมขาว/ดำ">
        <svg id="gwThemeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <svg id="gwThemeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
      </button>
      <div>
        <div class="gw-clock-label">เวลาไทย</div>
        <div class="gw-clock" id="gwClock">--:--:--</div>
      </div>
    </div>
  </div>

  <div class="gw-slots" id="gwSlots"></div>

  <div class="gw-card">
    <div class="gw-card-title-row">
      <div class="gw-card-title">สถานะการเชื่อมต่อ</div>
      <div class="gw-updated" id="gwUpdated"></div>
    </div>
    <div class="gw-status-row">
      <div class="gw-status-dot" id="gwStatusDot"></div>
      <div class="gw-status-text" id="gwStatusText">กำลังเชื่อมต่อกับ Google Sheets...</div>
      <button class="gw-btn gw-btn-ghost" id="gwRefreshBtn">รีเฟรชตอนนี้</button>
    </div>
    <div class="gw-error" id="gwError" style="display:none;"></div>
  </div>

  <div class="gw-card" id="gwPendingCard" style="display:none;">
    <div class="gw-card-title" style="margin-bottom:14px;">รอระบบเช็คผลอัตโนมัติ (ครบ 1 ชม.)</div>
    <div id="gwPendingList"></div>
  </div>

  <div class="gw-card">
    <div class="gw-card-title" style="margin-bottom:14px;">สรุปสถิติ</div>
    <div class="gw-stats" id="gwStats"></div>
  </div>

  <div class="gw-card">
    <div class="gw-card-title" style="margin-bottom:14px;">ประวัติทั้งหมด</div>
    <div class="gw-table-wrap" id="gwTableWrap"></div>
  </div>
</div>

<script>
(function() {
  const storage = {
    async get(key) {
      const v = localStorage.getItem(key);
      return v !== null ? { key, value: v } : null;
    },
    async set(key, value) {
      localStorage.setItem(key, value);
      return { key, value };
    }
  };

  const API_URL = 'https://script.google.com/macros/s/AKfycbw62gWU9qkeBEMnSyoawiqltdeBwvome9i2HZgEuw1rQvCUawW44Is8uFFTU2iyZTJBhA/exec';
  const THEME_KEY = 'gold_watch_theme';
  const REFRESH_MS = 60000;

  let entries = [];
  let lastFetchOk = false;

  function bkkParts() {
    const fmt = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'Asia/Bangkok', hour12: false,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    const parts = {};
    fmt.formatToParts(new Date()).forEach(p => parts[p.type] = p.value);
    return parts;
  }
  function todayStrBkk() {
    const p = bkkParts();
    return `${p.year}-${p.month}-${p.day}`;
  }
  function fmtDateThai(d) {
    const [y,m,day] = d.split('-');
    return `${day}/${m}/${y}`;
  }
  function fmtClockThai(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return new Intl.DateTimeFormat('th-TH', { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit' }).format(d);
  }

  async function fetchEntries() {
    const res = await fetch(API_URL, { method: 'GET' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data || !Array.isArray(data.entries)) throw new Error('รูปแบบข้อมูลไม่ถูกต้อง');
    return data.entries;
  }

  function updateClock() {
    const p = bkkParts();
    document.getElementById('gwClock').textContent = `${p.hour}:${p.minute}:${p.second}`;
    renderSlots();
  }

  function renderSlots() {
    const p = bkkParts();
    const curMinutes = (+p.hour) * 60 + (+p.minute);
    const today = todayStrBkk();
    const slotsDef = [{ hour: 7, minutes: 7*60 }, { hour: 20, minutes: 20*60 }];

    const el = document.getElementById('gwSlots');
    el.innerHTML = '';
    slotsDef.forEach(s => {
      const diff = curMinutes - s.minutes;
      const isNear = Math.abs(diff) <= 15;
      const todays = entries.find(e => e.date === today && e.slotHour === s.hour);
      const card = document.createElement('div');
      card.className = 'gw-slot-card' + (isNear ? ' active' : '');
      let flag = isNear ? '<div class="gw-slot-flag">ใกล้ถึงเวลา</div>' : '';
      let status, priceLine = '';
      if (todays) {
        status = '✓ บันทึกวันนี้แล้ว';
        priceLine = `<div class="gw-slot-price">ราคา ${todays.priceAt.toFixed(2)}${todays.priceAfter != null ? ' → ' + todays.priceAfter.toFixed(2) : ''}</div>`;
      } else {
        status = isNear ? 'ถึงเวลาบันทึกแล้ว รอระบบดึงราคา' : 'ยังไม่ถึงเวลา';
      }
      card.innerHTML = `${flag}<div class="gw-slot-time">${String(s.hour).padStart(2,'0')}:00 น.</div><div class="gw-slot-status">${status}</div>${priceLine}`;
      el.appendChild(card);
    });
  }

  function renderPending() {
    const nowMs = Date.now();
    const pending = entries.filter(e => e.priceAfter == null);
    const card = document.getElementById('gwPendingCard');
    const list = document.getElementById('gwPendingList');
    list.innerHTML = '';
    if (pending.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    pending.slice().sort((a,b) => new Date(a.loggedAt) - new Date(b.loggedAt)).forEach(e => {
      const loggedMs = new Date(e.loggedAt).getTime();
      const elapsedMin = Math.round((nowMs - loggedMs) / 60000);
      const ready = elapsedMin >= 60;
      const row = document.createElement('div');
      row.className = 'gw-pending-item';
      row.innerHTML = `<div class="gw-pending-info">
        ${fmtDateThai(e.date)} · ${String(e.slotHour).padStart(2,'0')}:00 น. — ราคาตอนนั้น <span>${e.priceAt.toFixed(2)}</span>
        &nbsp;·&nbsp; <span>${ready ? 'ครบ 1 ชม.แล้ว รอระบบเติมผลรอบถัดไป (~10 นาที)' : 'ผ่านมา ' + elapsedMin + ' นาที (รออีก ' + (60-elapsedMin) + ' นาที)'}</span>
      </div>`;
      list.appendChild(row);
    });
  }

  function directionLabel(dir) {
    if (dir === 'Up') return '<span class="gw-dir-up">▲ ขึ้น</span>';
    if (dir === 'Down') return '<span class="gw-dir-down">▼ ลง</span>';
    if (dir === 'Flat') return '<span class="gw-dir-flat">เท่าเดิม</span>';
    return '<span class="gw-dir-flat">รอผล</span>';
  }

  function renderStats() {
    const done = entries.filter(e => e.priceAfter != null);
    const up = done.filter(e => e.direction === 'Up').length;
    const down = done.filter(e => e.direction === 'Down').length;
    const winRate = done.length ? Math.round((up / done.length) * 100) : 0;
    document.getElementById('gwStats').innerHTML = `
      <div class="gw-stat-box"><div class="gw-stat-val">${done.length}</div><div class="gw-stat-lbl">เช็คผลแล้ว</div></div>
      <div class="gw-stat-box"><div class="gw-stat-val up">${up}</div><div class="gw-stat-lbl">ขึ้น</div></div>
      <div class="gw-stat-box"><div class="gw-stat-val down">${down}</div><div class="gw-stat-lbl">ลง</div></div>
      <div class="gw-stat-box"><div class="gw-stat-val">${winRate}%</div><div class="gw-stat-lbl">โอกาสขึ้น</div></div>
    `;
  }

  function renderTable() {
    const wrap = document.getElementById('gwTableWrap');
    if (entries.length === 0) {
      wrap.innerHTML = `<div class="gw-empty">${lastFetchOk ? 'ยังไม่มีข้อมูล รอถึงเวลา 07:00 หรือ 20:00 น. ระบบจะบันทึกให้เอง' : 'ยังโหลดข้อมูลไม่ได้'}</div>`;
      return;
    }
    const sorted = entries.slice().sort((a,b) => new Date(b.loggedAt) - new Date(a.loggedAt));
    const rows = sorted.map(e => `<tr>
      <td>${fmtDateThai(e.date)}</td>
      <td>${String(e.slotHour).padStart(2,'0')}:00</td>
      <td>${e.priceAt != null ? e.priceAt.toFixed(2) : '—'}</td>
      <td>${e.priceAfter != null ? e.priceAfter.toFixed(2) : '—'}</td>
      <td>${e.diff != null ? (e.diff >= 0 ? '+' : '') + e.diff.toFixed(2) : '—'}</td>
      <td>${directionLabel(e.direction)}</td>
    </tr>`).join('');
    wrap.innerHTML = `<table class="gw-table">
      <thead><tr><th>วันที่</th><th>เวลา</th><th>ราคาเริ่ม</th><th>ราคา +1ชม.</th><th>ผลต่าง</th><th>ทิศทาง</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function setStatus(ok, msg) {
    document.getElementById('gwStatusDot').classList.toggle('off', !ok);
    document.getElementById('gwStatusText').textContent = msg;
  }

  function showError(msg) {
    const el = document.getElementById('gwError');
    if (msg) { el.style.display = 'block'; el.textContent = msg; }
    else { el.style.display = 'none'; el.textContent = ''; }
  }

  async function refresh(manual) {
    const btn = document.getElementById('gwRefreshBtn');
    if (manual) { btn.disabled = true; btn.textContent = 'กำลังโหลด...'; }
    try {
      entries = await fetchEntries();
      lastFetchOk = true;
      showError(null);
      setStatus(true, 'เชื่อมต่อ Google Sheets สำเร็จ — ระบบกำลังทำงานอัตโนมัติ');
      document.getElementById('gwUpdated').textContent = 'อัปเดตล่าสุด ' + new Intl.DateTimeFormat('th-TH', { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', second: '2-digit' }).format(new Date());
    } catch (e) {
      lastFetchOk = false;
      setStatus(false, 'เชื่อมต่อ Google Sheets ไม่ได้ในตอนนี้');
      showError('รายละเอียด: ' + (e && e.message ? e.message : 'unknown error'));
    } finally {
      renderSlots();
      renderPending();
      renderStats();
      renderTable();
      if (manual) { btn.disabled = false; btn.textContent = 'รีเฟรชตอนนี้'; }
    }
  }

  function applyTheme(theme) {
    const root = document.getElementById('gwRoot');
    const isLight = theme === 'light';
    root.classList.toggle('gw-light', isLight);
    document.getElementById('gwThemeIconMoon').style.display = isLight ? 'none' : '';
    document.getElementById('gwThemeIconSun').style.display = isLight ? '' : 'none';
    const goldColor = isLight ? '#9C7415' : '#D9B65C';
    const bgColor = isLight ? '#FFFFFF' : '#1B2030';
    document.getElementById('gwLogoBg').setAttribute('fill', bgColor);
    ['gwLogoRing','gwLogoG1','gwLogoG2','gwLogoG3'].forEach(id => {
      document.getElementById(id).setAttribute('stroke', goldColor);
    });
    document.getElementById('gwLogoDot').setAttribute('fill', goldColor);
  }

  async function loadTheme() {
    let theme = 'dark';
    try {
      const res = await storage.get(THEME_KEY);
      if (res && res.value) theme = res.value;
    } catch (e) { /* default dark */ }
    applyTheme(theme);
  }

  async function toggleTheme() {
    const isLight = document.getElementById('gwRoot').classList.contains('gw-light');
    const next = isLight ? 'dark' : 'light';
    applyTheme(next);
    try { await storage.set(THEME_KEY, next); } catch (e) { /* ignore */ }
  }

  document.getElementById('gwThemeToggle').addEventListener('click', toggleTheme);
  document.getElementById('gwRefreshBtn').addEventListener('click', () => refresh(true));

  loadTheme();
  updateClock();
  setInterval(updateClock, 1000);
  refresh(false);
  setInterval(() => refresh(false), REFRESH_MS);
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
</body>
